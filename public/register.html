<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol — İş Takip</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>(function(){var t=localStorage.getItem('tema')||'aydinlik';document.documentElement.dataset.tema=t;})()</script>
</head>
<body class="auth-sayfasi">
  <button id="temaBtn" class="tema-btn tema-btn-auth" onclick="temaToggle()"></button>
  <div class="auth-kart">
    <h1>İş Takip</h1>
    <h2>Kayıt Ol</h2>
    <p id="hata" class="hata-mesaj"></p>
    <form id="registerForm">
      <label for="ad">Adınız</label>
      <input type="text" id="ad" required placeholder="Adı Soyadı">

      <label for="email">E-posta</label>
      <input type="email" id="email" required autocomplete="email" placeholder="ornek@sirket.com">

      <label for="sifre">Şifre</label>
      <input type="password" id="sifre" required autocomplete="new-password" placeholder="En az 6 karakter" minlength="6">

      <button type="submit" class="btn btn-primary btn-tam">Kayıt Ol</button>
    </form>
    <p class="auth-link">Zaten hesabınız var mı? <a href="/login.html">Giriş yapın</a></p>
  </div>
  <script type="module" src="/js/tema.js"></script>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
