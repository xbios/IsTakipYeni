<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — İş Takip</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-sayfasi">
  <div class="auth-kart">
    <h1>İş Takip</h1>
    <h2>Giriş Yap</h2>
    <p id="hata" class="hata-mesaj"></p>
    <form id="loginForm">
      <label for="email">E-posta</label>
      <input type="email" id="email" required autocomplete="email" placeholder="ornek@sirket.com">

      <label for="sifre">Şifre</label>
      <input type="password" id="sifre" required autocomplete="current-password" placeholder="••••••••">

      <button type="submit" class="btn btn-primary btn-tam">Giriş Yap</button>
    </form>
    <p class="auth-link">Hesabınız yok mu? <a href="/register.html">Kayıt olun</a></p>
  </div>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
